name: Deploy Instagram AI Daily App to Azure

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
  AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
  AZURE_APP_SERVICE_PLAN: ${{ vars.AZURE_APP_SERVICE_PLAN }}
  AZURE_WEBAPP_NAME: ${{ vars.AZURE_WEBAPP_NAME }}
  PYTHON_VERSION: '3.12'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies for validation
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate Flask app imports
        run: |
          python - <<'PY'
          import app
          print('App import OK')
          PY

      - name: Azure login using OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create or update Azure App Service
        uses: azure/cli@v2
        with:
          inlineScript: |
            set -e
            az group create \
              --name "$AZURE_RESOURCE_GROUP" \
              --location "$AZURE_LOCATION"

            az appservice plan create \
              --name "$AZURE_APP_SERVICE_PLAN" \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --location "$AZURE_LOCATION" \
              --is-linux \
              --sku B1

            if ! az webapp show --resource-group "$AZURE_RESOURCE_GROUP" --name "$AZURE_WEBAPP_NAME" >/dev/null 2>&1; then
              az webapp create \
                --name "$AZURE_WEBAPP_NAME" \
                --resource-group "$AZURE_RESOURCE_GROUP" \
                --plan "$AZURE_APP_SERVICE_PLAN" \
                --runtime "PYTHON|3.12"
            fi

            az webapp config set \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --name "$AZURE_WEBAPP_NAME" \
              --linux-fx-version "PYTHON|3.12" \
              --startup-file "startup.sh"

            az webapp config appsettings set \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --name "$AZURE_WEBAPP_NAME" \
              --settings \
                SCM_DO_BUILD_DURING_DEPLOYMENT=true \
                ENABLE_ORYX_BUILD=true \
                FLASK_SECRET_KEY="${{ secrets.FLASK_SECRET_KEY }}" \
                OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
                OPENAI_MODEL="${{ vars.OPENAI_MODEL }}" \
                IG_ACCESS_TOKEN="${{ secrets.IG_ACCESS_TOKEN }}" \
                IG_USER_ID="${{ secrets.IG_USER_ID }}" \
                GRAPH_API_VERSION="${{ vars.GRAPH_API_VERSION }}" \
                PUBLIC_MEDIA_BASE_URL="https://${AZURE_WEBAPP_NAME}.azurewebsites.net/static/generated"

            az webapp config set \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --name "$AZURE_WEBAPP_NAME" \
              --always-on true

      - name: Deploy code to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: .

      - name: Show deployed URL
        run: |
          echo "Deployed: https://${AZURE_WEBAPP_NAME}.azurewebsites.net"
          echo "Health:   https://${AZURE_WEBAPP_NAME}.azurewebsites.net/health"
